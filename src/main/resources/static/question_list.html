<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>试题查询</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background:#f0f2f5; padding:24px; }
        .table-card { border-radius:12px; overflow:hidden; box-shadow:0 2px 12px rgba(0,0,0,.08); margin-bottom:24px; }
        .table-card thead { background:linear-gradient(135deg,#1a1a2e,#16213e);color:#fff; }
        .table-card tbody tr { transition:background .15s; }
        .table-card tbody tr:hover { background:#e8f4fd; }
        .answer-badge { display:inline-block;width:26px;height:26px;line-height:26px;text-align:center;border-radius:6px;
                        background:#e9ecef;font-weight:700;color:#495057;font-size:13px; }
        .opt-text { font-size:13px;color:#6c757d;max-width:120px;display:inline-block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;vertical-align:middle; }
        .q-title { max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:inline-block;vertical-align:middle; }
        .group-header { background:#fff; border-radius:12px 12px 0 0; padding:14px 20px; display:flex; align-items:center;
                        justify-content:space-between; cursor:pointer; border-bottom:2px solid #e9ecef; user-select:none; }
        .group-header:hover { background:#f8f9fa; }
        .group-header .arrow { transition:transform .3s; font-size:12px; }
        .group-header.collapsed .arrow { transform:rotate(-90deg); }
        .q-table { counter-reset: qnum 0; }
        .q-table tbody tr { counter-increment: qnum; }
        .q-table .q-num::before { content: counter(qnum); }
    </style>
</head>
<body>
    <div class="container-fluid" style="max-width:1200px;">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h5 class="fw-bold text-secondary">📋 试题列表（按科目分类）</h5>
            <span class="text-muted small" id="qCount"></span>
        </div>
        <div id="examGroups">加载中...</div>
        <div id="msg" class="text-center text-danger mt-3 small"></div>
    </div>
    <script src="/myWeb/js/common.js"></script>
    <script>
    let isAdmin=false, allQuestions=[], examsMap={};

    function groupByExam(questions){
        var groups = {};
        for(var i=0;i<questions.length;i++){
            var q = questions[i];
            var eid = q.examId || 0;
            if(!groups[eid]) groups[eid] = [];
            groups[eid].push(q);
        }
        return groups;
    }

    function renderGroups(){
        var groups = groupByExam(allQuestions);
        var examIds = Object.keys(groups);
        if(!examIds.length){
            document.getElementById('examGroups').innerHTML='<div class="text-center py-5 text-muted"><h1>📭</h1><p>暂无试题</p></div>';
            return;
        }
        var totalCount = 0;
        var html = '';
        for(var i=0;i<examIds.length;i++){
            var eid = examIds[i];
            var qs = groups[eid];
            totalCount += qs.length;
            var examName = examsMap[eid] || '未分类';
            var totalScore = 0;
            for(var s=0;s<qs.length;s++){ totalScore += (qs[s].score||25); }
            var collapsed = i > 0 ? 'collapsed' : '';
            var show = i === 0 ? '' : 'd-none';
            html += '<div class="table-card">';
            html += '<div class="group-header '+collapsed+'" data-toggle="'+eid+'" onclick="toggleGroup(this)">';
            html += '<span><b>📖 '+examName+'</b> <span class="badge bg-primary ms-2">'+qs.length+' 题</span></span>';
            html += '<span><span class="text-muted small me-3">总分：'+totalScore+' 分</span><span class="arrow">▼</span></span>';
            html += '</div>';
            html += '<div id="group_'+eid+'" class="'+show+'">';
            html += '<table class="table table-borderless align-middle mb-0 q-table">';
            html += '<thead><tr><th>#</th><th>题目</th><th class="text-center">A</th><th class="text-center">B</th><th class="text-center">C</th><th class="text-center">D</th>';
            if(isAdmin) html += '<th class="text-center">答案</th><th class="text-center">分值</th><th>操作</th>';
            html += '</tr></thead><tbody>';
            for(var j=0;j<qs.length;j++){
                var q = qs[j];
                var num = j + 1;
                html += '<tr><td class="q-num text-muted small"></td>';
                html += '<td><span class="q-title fw-semibold" title="'+q.title+'">'+q.title+'</span></td>';
                html += '<td class="text-center"><span class="opt-text" title="'+q.optionA+'">'+q.optionA+'</span></td>';
                html += '<td class="text-center"><span class="opt-text" title="'+q.optionB+'">'+q.optionB+'</span></td>';
                html += '<td class="text-center"><span class="opt-text" title="'+q.optionC+'">'+q.optionC+'</span></td>';
                html += '<td class="text-center"><span class="opt-text" title="'+q.optionD+'">'+q.optionD+'</span></td>';
                if(isAdmin){
                    html += '<td class="text-center"><span class="answer-badge">'+q.answer+'</span></td>';
                    html += '<td class="text-center"><b>'+(q.score||25)+'</b></td>';
                    html += '<td><div class="d-flex gap-1">';
                    html += '<button class="btn btn-outline-danger btn-sm rounded-pill px-3" onclick="del('+q.questionId+')">删除</button>';
                    html += '<a href="/myWeb/question_update.html?questionId='+q.questionId+'" target="right" class="btn btn-outline-warning btn-sm rounded-pill px-3">编辑</a>';
                    html += '</div></td>';
                }
                html += '</tr>';
            }
            html += '</tbody></table></div></div>';
        }
        document.getElementById('qCount').innerText = '共 '+examIds.length+' 个科目，'+totalCount+' 道题';
        document.getElementById('examGroups').innerHTML = html;
    }

    function toggleGroup(el){
        var eid = el.getAttribute('data-toggle');
        var body = document.getElementById('group_'+eid);
        el.classList.toggle('collapsed');
        body.classList.toggle('d-none');
    }

    function del(questionId){
        if(!confirm('确认删除？')) return;
        $del('/api/question/delete',{questionId:questionId}).then(function(r){
            document.getElementById('msg').innerText = r.msg;
            if(r.code===200){
                allQuestions = allQuestions.filter(function(q){return q.questionId!=questionId;});
                renderGroups();
            }
        });
    }

    (function init(){
        Promise.all([$get('/api/currentUser'), $get('/api/exam/subjects'), $get('/api/question/find')]).then(function(results){
            var u=results[0], examsRes=results[1], allQRes=results[2];
            if(u.code===200&&u.data&&u.data.role==='admin') isAdmin=true;
            allQuestions = (allQRes.code===200&&allQRes.data) ? allQRes.data : [];
            examsMap = {};
            if(examsRes.code===200&&examsRes.data) examsRes.data.forEach(function(e){examsMap[e.examId]=e.name;});
            renderGroups();
        });
    })();
    </script>
</body>
</html>
