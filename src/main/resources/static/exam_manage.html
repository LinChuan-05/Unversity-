<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>科目管理</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background:#f0f2f5; padding:24px; }
        .table-card { border-radius:12px; overflow:hidden; box-shadow:0 2px 12px rgba(0,0,0,.08); }
        .table-card thead { background:linear-gradient(135deg,#1a1a2e,#16213e);color:#fff; }
        .table-card tbody tr { transition:background .15s; }
        .table-card tbody tr:hover { background:#e8f4fd; }
        .add-card { border-radius:12px;box-shadow:0 1px 8px rgba(0,0,0,.06); }
    </style>
</head>
<body>
    <div class="container-fluid" style="max-width:1200px;">
        <h5 class="fw-bold text-secondary mb-3">📚 考试科目管理（组卷设置）</h5>
        <div class="card add-card border-0 mb-3">
            <div class="card-body">
                <form id="addForm" class="row g-2 align-items-end">
                    <div class="col-md-2"><label class="form-label small fw-semibold">科目名称</label><input class="form-control form-control-sm" name="name" placeholder="如: Java程序设计" required></div>
                    <div class="col-md-1"><label class="form-label small fw-semibold">时长(分)</label><input class="form-control form-control-sm" name="duration" type="number" min="1" max="180" value="10" required></div>
                    <div class="col-md-1"><label class="form-label small fw-semibold">抽题数</label><input class="form-control form-control-sm" name="questionCount" type="number" min="1" max="50" value="4" required></div>
                    <div class="col-md-1"><label class="form-label small fw-semibold">限考次</label><input class="form-control form-control-sm" name="maxAttempts" type="number" min="1" max="99" value="1" required></div>
                    <div class="col-md-2"><label class="form-label small fw-semibold">说明</label><input class="form-control form-control-sm" name="description" placeholder="可选"></div>
                    <div class="col-md-2"><button type="submit" class="btn btn-primary btn-sm w-100 rounded-pill">➕ 添加科目</button></div>
                </form>
                <div class="text-muted small mt-2">💡 总分固定 100 分，系统自动均分给每道题</div>
            </div>
        </div>
        <div class="table-card">
            <table class="table table-borderless align-middle mb-0">
                <thead><tr><th>#</th><th>科目名称</th><th>⏱ 时长</th><th>📝 抽题</th><th>🔄 限考</th><th>说明</th><th>操作</th></tr></thead>
                <tbody id="examTbody"></tbody>
            </table>
        </div>
        <div id="emptyMsg" class="text-center py-5 text-muted d-none"><h1>📭</h1><p>暂无科目，请添加</p></div>
        <div id="msg" class="text-center text-danger mt-3 small"></div>
    </div>
    <script src="/myWeb/js/common.js"></script>
    <script>
    loadExams();
    async function loadExams(){
        const res=await $get('/api/exam/subjects');
        if(!res.code===200 || !res.data)return;
        if(!res.data.length){document.getElementById('emptyMsg').classList.remove('d-none');return;}
        document.getElementById('emptyMsg').classList.add('d-none');
        let html='';
        res.data.forEach(e=>{html+=`<tr>
            <td class="text-muted small">#${e.examId}</td>
            <td><b>${e.name}</b></td>
            <td><span class="badge bg-info">${e.duration} 分钟</span></td>
            <td><span class="badge bg-primary">抽 ${e.questionCount||4} 题</span></td>
            <td><span class="badge bg-warning text-dark">${e.maxAttempts||1} 次</span></td>
            <td class="text-muted small">${e.description||'-'}</td>
            <td><div class="d-flex gap-1">
                <button class="btn btn-outline-danger btn-sm rounded-pill px-3" onclick="del(${e.examId})">删除</button>
                <a href="/myWeb/exam_edit.html?examId=${e.examId}" target="right" class="btn btn-outline-warning btn-sm rounded-pill px-3">编辑</a>
            </div></td></tr>`;});
        document.getElementById('examTbody').innerHTML=html;
    }
    document.getElementById('addForm').addEventListener('submit',async e=>{e.preventDefault();const data=Object.fromEntries(new FormData(e.target));const res=await $post('/api/examManage/add',data);document.getElementById('msg').innerText=res.msg;if(res.code===200){e.target.reset();loadExams();}});
    async function del(examId){if(!confirm('确认删除该科目及其所有试题？'))return;const res=await $del('/api/examManage/delete',{examId});document.getElementById('msg').innerText=res.msg;loadExams();}
    </script>
</body>
</html>
