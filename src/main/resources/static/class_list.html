<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>班级管理</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background:#f0f2f5; padding:24px; }
        .group-card { border-radius:12px; overflow:hidden; box-shadow:0 2px 12px rgba(0,0,0,.08); margin-bottom:20px; }
        .group-header { background:#fff; padding:14px 20px; display:flex; align-items:center; justify-content:space-between; cursor:pointer; border-bottom:2px solid #e9ecef; user-select:none; }
        .group-header:hover { background:#f8f9fa; }
        .group-header .arrow { transition:transform .3s; font-size:12px; }
        .group-header.collapsed .arrow { transform:rotate(-90deg); }
        .table-card { border-radius:0; box-shadow:none; }
        .table-card thead { background:linear-gradient(135deg,#1a1a2e,#16213e);color:#fff; }
        .table-card tbody tr:hover { background:#e8f4fd; }
        .score-good { color:#198754; font-weight:700; }
        .score-bad  { color:#dc3545; font-weight:700; }
        .score-na   { color:#adb5bd; }
        .add-card { border-radius:12px;box-shadow:0 1px 8px rgba(0,0,0,.06); }
        .unassigned-card { border-radius:12px;box-shadow:0 1px 8px rgba(0,0,0,.06); margin-bottom:16px; }
    </style>
</head>
<body>
    <div class="container-fluid" style="max-width:1200px;">
        <h5 class="fw-bold text-secondary mb-3">🏫 班级管理</h5>

        <!-- 创建班级 + 未分配学生 -->
        <div class="row g-3 mb-3">
            <div class="col-md-4">
                <div class="card add-card border-0">
                    <div class="card-body">
                        <form id="createClassForm" class="d-flex gap-2">
                            <input class="form-control form-control-sm" name="className" placeholder="班级名称 如: 软工2411班" required>
                            <button type="submit" class="btn btn-primary btn-sm rounded-pill">创建</button>
                        </form>
                    </div>
                </div>
            </div>
            <div class="col-md-8">
                <div class="card unassigned-card border-0" id="unassignedCard" style="display:none;">
                    <div class="card-header bg-warning text-dark py-2"><b>⚠ 未分配学生</b>（拖入下方班级即可分配）</div>
                    <div class="card-body py-2">
                        <select id="targetClass" class="form-select form-select-sm d-inline w-auto me-2"><option value="">选择目标班级</option></select>
                        <button class="btn btn-sm btn-success rounded-pill" id="batchAssignBtn">分配选中学生</button>
                        <div id="unassignedList" class="mt-2" style="max-height:200px;overflow-y:auto"></div>
                    </div>
                </div>
            </div>
        </div>

        <div id="classArea">加载中...</div>
        <div id="msg" class="text-center text-success mt-3 small"></div>
    </div>
    <script src="/myWeb/js/common.js"></script>
    <script>
    let allClasses = [];

    async function loadAll(){
        const res = await $get('/api/user/classes');
        if(res.code!==200||!res.data||!res.data.length){
            document.getElementById('classArea').innerHTML='<div class="text-center py-5 text-muted"><h1>📭</h1><p>暂无班级，请先创建</p></div>';
            return;
        }
        allClasses = res.data;
        renderClasses();
        loadUnassigned();
    }

    function renderClasses(){
        let html = '';
        for (let i = 0; i < allClasses.length; i++) {
            const cls = allClasses[i];
            const className = cls.class_name || cls.className || '未命名';
            const collapsed = i > 0 ? 'collapsed' : '';
            const show = i === 0 ? '' : 'd-none';
            html += `<div class="group-card">
                <div class="group-header ${collapsed}" onclick="toggleGroup(this,'cls_${i}')">
                    <span><b>📖 ${className}</b> <span class="badge bg-primary ms-2" id="cnt_${i}">加载中...</span></span>
                    <span>
                        <button class="btn btn-outline-danger btn-sm rounded-pill px-2 me-2" onclick="event.stopPropagation();delClass('${className}',${cls.class_id||cls.classId})">删除班级</button>
                        <span class="arrow">▼</span>
                    </span>
                </div>
                <div id="cls_${i}" class="${show}">
                    <div id="body_${i}" class="text-center py-3 text-muted">加载中...</div>
                </div>
            </div>`;
        }
        document.getElementById('classArea').innerHTML = html;
        for (let i = 0; i < allClasses.length; i++) {
            loadClassStudents(allClasses[i], i);
        }
    }

    async function loadClassStudents(cls, idx) {
        const className = cls.class_name || cls.className || '';
        const sRes = await $get('/api/user/classStudents?className=' + encodeURIComponent(className));
        if (sRes.code !== 200 || !sRes.data) {
            document.getElementById('body_' + idx).innerHTML = '<div class="text-center py-3 text-danger">加载失败</div>';
            return;
        }
        const data = sRes.data;
        if (!data.length) {
            document.getElementById('cnt_' + idx).innerText = '0 人';
            document.getElementById('body_' + idx).innerHTML = '<div class="text-center py-3 text-muted">该班级暂无学生</div>';
            return;
        }
        const studentMap = {};
        const examNames = new Set();
        data.forEach(r => {
            const uid = r.userId;
            if (!studentMap[uid]) studentMap[uid] = { userName: r.userName||r.realName||r.userId, sex: r.sex||'', scores: {} };
            if (r.examName) { examNames.add(r.examName); studentMap[uid].scores[r.examName] = { total: r.totalScore || 0, count: r.answerCount || 0 }; }
        });
        const examList = [...examNames];
        document.getElementById('cnt_' + idx).innerText = Object.keys(studentMap).length + ' 人';
        let html = '<div class="table-card"><table class="table table-borderless align-middle mb-0"><thead><tr><th>姓名</th><th>性别</th>';
        examList.forEach(en => html += '<th class="text-center">' + en + '</th>');
        html += '<th class="text-center">总成绩</th></tr></thead><tbody>';
        Object.values(studentMap).forEach(s => {
            html += `<tr><td><b>${s.userName}</b></td><td>${s.sex}</td>`;
            let totalAll = 0;
            examList.forEach(en => {
                const sc = s.scores[en];
                if (sc && sc.count > 0) { html += `<td class="text-center score-${sc.total >= 60 ? 'good' : 'bad'}">${sc.total} 分</td>`; totalAll += sc.total; }
                else html += '<td class="text-center score-na">未考</td>';
            });
            html += `<td class="text-center fw-bold">${totalAll} 分</td></tr>`;
        });
        html += '</tbody></table></div>';
        document.getElementById('body_' + idx).innerHTML = html;
    }

    async function loadUnassigned(){
        const res = await $get('/api/user/unassignedStudents');
        const card = document.getElementById('unassignedCard');
        if(res.code!==200||!res.data||!res.data.length){ card.style.display='none'; return; }
        card.style.display='block';
        let html = '';
        res.data.forEach(s => {
            html += `<label class="d-block mb-1" style="cursor:pointer">
                <input type="checkbox" class="unassigned-check" value="${s.userId}">
                <span class="badge bg-secondary">${s.userName || s.realName || ('用户#'+s.userId)}</span>
            </label>`;
        });
        document.getElementById('unassignedList').innerHTML = html || '<span class="text-muted small">无</span>';
        const sel = document.getElementById('targetClass');
        sel.innerHTML = '<option value="">选择目标班级</option>';
        allClasses.forEach(c => { sel.innerHTML += `<option value="${c.class_id||c.classId}">${c.class_name||c.className}</option>`; });
    }

    document.getElementById('batchAssignBtn').addEventListener('click', async ()=>{
        const classId = document.getElementById('targetClass').value;
        if(!classId){ alert('请先选择目标班级'); return; }
        const checks = document.querySelectorAll('.unassigned-check:checked');
        if(!checks.length){ alert('请至少勾选一个学生'); return; }
        for(const cb of checks){
            await $post('/api/user/assignClass', {userId: cb.value, classId});
        }
        document.getElementById('msg').innerText = `已分配 ${checks.length} 名学生`;
        loadAll();
    });

    async function quickAssign(userId){
        const classId = document.getElementById('targetClass').value;
        if(!classId){ alert('请先选择目标班级'); return; }
        const res = await $post('/api/user/assignClass', {userId, classId});
        document.getElementById('msg').innerText = res.msg;
        if(res.code===200){ loadAll(); }
    }

    document.getElementById('createClassForm').addEventListener('submit', async e=>{
        e.preventDefault();
        const data = Object.fromEntries(new FormData(e.target));
        const res = await $post('/api/user/createClass', data);
        document.getElementById('msg').innerText = res.msg;
        if(res.code===200){ e.target.reset(); loadAll(); }
    });

    async function delClass(className, classId){
        if(!confirm(`确认删除班级「${className}」？该班级下的学生将变为未分配状态。`)) return;
        const res = await $del('/api/user/deleteClass', {classId});
        document.getElementById('msg').innerText = res.msg;
        if(res.code===200) loadAll();
    }

    function toggleGroup(el, id){ el.classList.toggle('collapsed'); document.getElementById(id).classList.toggle('d-none'); }

    loadAll();
    </script>
</body>
</html>
